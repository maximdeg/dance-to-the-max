name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Migrations are checked in; tests apply them to in-memory PGLite, so no
      # database service is needed in CI.
      - run: npm run typecheck

      - run: npm test
